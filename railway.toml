# Railway monorepo — configure each service with its Root Directory in the Railway dashboard:
#   backend service   → Root Directory: backend/
#   celery-worker     → Root Directory: backend/  (override start command in dashboard)
#   frontend service  → Root Directory: frontend/
#
# Each service picks up its own railway.json from its subdirectory.
# PostgreSQL and Redis are added as Railway plugins (no config needed here).

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
