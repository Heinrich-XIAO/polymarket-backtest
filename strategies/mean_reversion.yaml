name: Mean Reversion
description: Buy when price drops significantly in the lookback window, expecting recovery toward fair value.

entry:
  condition: price_drop_pct > 0.08
  lookback_days: 7

exit:
  take_profit: 0.12
  stop_loss: 0.07

filters:
  min_volume: 1000
  categories: [politics, crypto, economics]
  max_days_to_resolution: 30

initial_capital: 1000.0
stake_pct: 0.05
