name: Resolution Fade
description: Fade overpriced markets close to resolution — sell YES when probability is too high near deadline.

entry:
  condition: price_drop_pct > 0.05 and price < 0.35
  lookback_days: 3

exit:
  take_profit: 0.20
  stop_loss: 0.10

filters:
  min_volume: 2000
  categories: [politics, economics]
  max_days_to_resolution: 7

initial_capital: 1000.0
stake_pct: 0.04
