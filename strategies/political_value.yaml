name: Political Value
description: Long-term value plays in political markets — enter cheap, hold to resolution.

entry:
  condition: price_drop_pct > 0.06 and price < 0.45
  lookback_days: 14

exit:
  take_profit: 0.25
  stop_loss: 0.15

filters:
  min_volume: 500
  categories: [politics]
  max_days_to_resolution: 60

initial_capital: 1000.0
stake_pct: 0.03
