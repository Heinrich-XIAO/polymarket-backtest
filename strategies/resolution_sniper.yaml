name: Resolution Sniper
description: Enter high-probability markets (P > 0.85) 48h before resolution to capture the final compression.

entry:
  condition: price > 0.85
  lookback_days: 1

exit:
  take_profit: 0.10
  stop_loss: 0.15

filters:
  min_volume: 500
  categories: [politics]
  max_days_to_resolution: 2
  min_days_to_resolution: 0

initial_capital: 1000.0
stake_pct: 0.05
