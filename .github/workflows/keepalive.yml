name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://polymarket-backtest-ir3p.onrender.com/health)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "Backend is alive" || echo "Backend waking up..."
