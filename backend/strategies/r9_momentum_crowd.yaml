name: R9 Momentum Crowd
description: Rising price in crowded sector — herd momentum.

entry:
  condition: price_drop_pct < -0.05 and concentration > 4
  lookback_days: 5

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
