name: R3 Drop-Vol Ratio
description: Drop many times larger than daily volatility — outlier event.

entry:
  condition: price_drop_pct > price_volatility * 3 and price_drop_pct > 0.06
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
