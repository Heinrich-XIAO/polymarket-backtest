name: R2 Age-Range Combo
description: Old markets with wide price ranges — mature volatility.

entry:
  condition: market_age_days * price_range > 3
  lookback_days: 10

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
