name: R1 Combined Oversold
description: SMA below zero plus a price drop — two layers of oversold confirmation.

entry:
  condition: price_momentum + price_drop_pct > 0.2
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
