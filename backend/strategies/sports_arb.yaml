name: Sports Arbitrage
description: Target mispriced sports outcomes relative to implied probabilities from traditional bookmakers.

entry:
  condition: price_drop_pct > 0.07
  lookback_days: 5

exit:
  take_profit: 0.10
  stop_loss: 0.06

filters:
  min_volume: 3000
  categories: [sports]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.05
