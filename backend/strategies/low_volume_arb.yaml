name: Low Volume Arb
description: Target illiquid niche markets where price discovery lags — hold to resolution.

entry:
  condition: price_drop_pct > 0.10
  lookback_days: 5

exit:
  take_profit: 0.90
  stop_loss: 0.85

filters:
  min_volume: 10
  max_volume: 2000
  categories: []
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.02
