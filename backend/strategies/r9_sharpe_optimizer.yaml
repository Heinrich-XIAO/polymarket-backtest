name: R9 Sharpe Optimizer
description: Balanced drop with volatility confirmation — maximizing risk-adjusted return.

entry:
  condition: price_drop_pct > 0.07 and price_volatility > 0.02 and price_volatility < 0.05 and volume_zscore > 0.5
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
