name: Cross-Category Momentum
description: Pure momentum across all categories — rising price with volume confirmation.

entry:
  condition: price_drop_pct < -0.08 and volume_zscore > 1.0
  lookback_days: 5

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: []
  max_days_to_resolution: 9999

stake_pct: 0.05
