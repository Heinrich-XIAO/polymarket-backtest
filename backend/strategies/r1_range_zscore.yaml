name: R1 Range-Zscore Combo
description: Range plus volume contribution — movement with participation.

entry:
  condition: price_range + volume_zscore * 0.02 > 0.1
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
