name: Mature Market Fade
description: Older markets with a volatility spike — faded narratives revert harder.

entry:
  condition: market_age_days > 60 and price_volatility > 0.04 and price_drop_pct > 0.10
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, economics]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.04
