name: Volatility Oversold
description: High volatility combined with price below SMA — oversold bounce signal.

entry:
  condition: price_volatility > 0.05 and price_momentum < -0.05
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
