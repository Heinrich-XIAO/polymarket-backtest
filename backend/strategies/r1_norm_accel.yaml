name: R1 Normalized Acceleration
description: Acceleration relative to volatility — catching genuine trend changes.

entry:
  condition: price_acceleration / max(price_volatility, 0.001) > 0.5
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
