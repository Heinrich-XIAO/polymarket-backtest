name: Dollar Cost Averaging
description: Small consistent positions across many markets regardless of price movement.

entry:
  condition: price_drop_pct > 0.03
  lookback_days: 1

exit:
  take_profit: 0.08
  stop_loss: 0.05

filters:
  min_volume: 200
  categories: []
  max_days_to_resolution: 30

initial_capital: 1000.0
stake_pct: 0.02
