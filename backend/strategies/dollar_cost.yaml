name: Dollar Cost Averaging
description: Small consistent positions in any liquid market regardless of direction — diversification play.

entry:
  condition: price_drop_pct > 0.03
  lookback_days: 1

exit:
  take_profit: 0.90
  stop_loss: 0.85

filters:
  min_volume: 10000
  categories: []
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.02
