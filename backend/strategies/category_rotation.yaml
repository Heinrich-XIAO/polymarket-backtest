name: Category Rotation
description: Broad market sweep — enter any category on dip, rotate across all active markets with tight stops.

entry:
  condition: price_drop_pct > 0.07
  lookback_days: 5

exit:
  take_profit: 0.10
  stop_loss: 0.06

filters:
  min_volume: 1000
  categories: []
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.03
