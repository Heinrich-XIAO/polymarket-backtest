name: Category Rotation
description: Broad market sweep — rotate into any liquid market after a 7%+ dip, hold to resolution.

entry:
  condition: price_drop_pct > 0.07
  lookback_days: 5

exit:
  take_profit: 0.90
  stop_loss: 0.85

filters:
  min_volume: 15000
  categories: []
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.03
