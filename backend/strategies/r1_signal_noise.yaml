name: R1 Signal to Noise
description: Drop relative to volatility — high signal-to-noise ratio entries.

entry:
  condition: price_drop_pct / max(price_volatility, 0.001) > 3
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
