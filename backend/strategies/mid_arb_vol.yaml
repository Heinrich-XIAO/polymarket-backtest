name: Mid-Price Vol Arb
description: Mid-priced volatile markets where a dip is likely noise — pure mean reversion.

entry:
  condition: price > 0.30 and price < 0.70 and price_volatility > 0.025 and price_drop_pct > 0.06
  lookback_days: 5

exit:
  take_profit: 0.90
  stop_loss: 0.85

filters:
  min_volume: 8000
  categories: [politics, crypto, economics]
  max_days_to_resolution: 9999

stake_pct: 0.05
