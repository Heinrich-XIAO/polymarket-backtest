name: R3 Momentum Acceleration
description: Strong momentum that's accelerating — trend getting stronger.

entry:
  condition: abs(price_momentum) > 0.06 and abs(price_acceleration) > 0.01
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
