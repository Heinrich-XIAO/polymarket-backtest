name: R1 Volatility Squared
description: Square volatility to emphasize extreme readings — only the most volatile.

entry:
  condition: pow(price_volatility, 2) > 0.0025 and price_drop_pct > 0.05
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
