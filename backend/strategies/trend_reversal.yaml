name: Trend Reversal
description: Drop slowing down after a fall — deceleration signals a potential bottom.

entry:
  condition: price_drop_pct > 0.08 and price_acceleration < -0.01
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
