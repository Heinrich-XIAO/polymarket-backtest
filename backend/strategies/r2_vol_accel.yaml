name: R2 Volatility-Acceleration
description: High volatility or strong acceleration — momentum in motion.

entry:
  condition: price_volatility + abs(price_acceleration) > 0.05
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
