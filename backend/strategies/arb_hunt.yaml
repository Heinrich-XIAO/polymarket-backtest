name: Arb Hunt
description: Enter markets priced near 0.5 after a 6%+ drop — pure mispricing capture, hold to resolution.

entry:
  condition: price_drop_pct > 0.06 and price > 0.35 and price < 0.65
  lookback_days: 5

exit:
  take_profit: 0.90
  stop_loss: 0.85

filters:
  min_volume: 10000
  categories: []
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.04
