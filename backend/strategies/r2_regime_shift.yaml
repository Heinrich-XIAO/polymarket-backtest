name: R2 Regime Shift
description: Price moving without momentum change — potential trend reversal.

entry:
  condition: abs(price_momentum) < 0.02 and price_drop_pct > 0.08
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
