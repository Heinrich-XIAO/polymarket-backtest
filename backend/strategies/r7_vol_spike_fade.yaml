name: R7 Vol Spike Fade
description: Massive vol spike with any drop — volatility itself is mean-reverting.

entry:
  condition: price_volatility > 0.06 and price_drop_pct > 0.03
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
