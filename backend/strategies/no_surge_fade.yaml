name: NO Surge Fade
description: Buy NO when NO has dropped sharply (= YES surged) with volatility — fade the YES euphoria.

entry:
  condition: no_price_drop_pct > 0.10 and price_volatility > 0.03 and no_price < 0.50
  lookback_days: 5

exit:
  take_profit: 0.40
  stop_loss: 0.50

filters:
  min_volume: 3000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 90

position_side: "no"
stake_pct: 0.04
