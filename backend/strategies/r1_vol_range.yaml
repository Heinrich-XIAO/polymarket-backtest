name: R1 Volatility-Range
description: Both range and volatility elevated — genuine instability, not noise.

entry:
  condition: price_range * price_volatility > 0.005
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
