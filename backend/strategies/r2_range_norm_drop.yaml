name: R2 Range-Normalized Drop
description: Drop as a significant fraction of the recent range — meaningful move.

entry:
  condition: price_drop_pct / max(price_range, 0.001) > 0.5
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
