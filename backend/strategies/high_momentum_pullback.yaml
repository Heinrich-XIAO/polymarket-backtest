name: High Momentum Pullback
description: Price pulled back to SMA during an uptrend — buy the dip in a rising market.

entry:
  condition: price_momentum > 0.05 and price_drop_pct > 0.04
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
