name: R8 Composite Score
description: Multi-factor score — drop, vol, volume all contributing.

entry:
  condition: price_drop_pct * 10 + price_volatility * 100 + volume_zscore * 0.5 > 5
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
