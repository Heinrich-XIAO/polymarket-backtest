name: Momentum
description: Follow rising price momentum in politics and crypto — buy the rise, hold to resolution.

entry:
  condition: price_drop_pct < -0.10
  lookback_days: 5

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 8000
  categories: [politics, crypto]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.05
