name: Momentum
description: Follow price momentum — enter when price has risen sharply, betting the trend continues.

entry:
  condition: price_drop_pct < -0.10
  lookback_days: 5

exit:
  take_profit: 0.15
  stop_loss: 0.08

filters:
  min_volume: 5000
  categories: [politics, sports, crypto]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.06
