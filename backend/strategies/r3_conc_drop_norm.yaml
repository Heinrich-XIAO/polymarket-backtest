name: R3 Concentration Drop
description: Drop normalized by concentration — crowded sector drops are noise.

entry:
  condition: price_drop_pct / max(concentration, 1) > 0.04
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
