name: R2 Double Normalized
description: Signal-to-noise ratio boosted by volume — highest conviction drops.

entry:
  condition: (price_drop_pct / max(price_volatility, 0.001)) * (1 + volume_zscore) > 5
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
