name: Event Spike Reversal
description: Capture reversal after 15%+ spike in high-volume markets — hold to resolution.

entry:
  condition: price_drop_pct > 0.15
  lookback_days: 2

exit:
  take_profit: 0.90
  stop_loss: 0.85

filters:
  min_volume: 15000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.06
