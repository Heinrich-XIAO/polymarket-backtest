name: Event Spike Reversal
description: Capture reversal after sudden price spikes caused by news events.

entry:
  condition: price_drop_pct > 0.15
  lookback_days: 2

exit:
  take_profit: 0.10
  stop_loss: 0.12

filters:
  min_volume: 10000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 45

initial_capital: 1000.0
stake_pct: 0.07
