name: R5 Range-Drop Product
description: Wide range times big drop — high-magnitude moves.

entry:
  condition: price_range * price_drop_pct > 0.015
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
