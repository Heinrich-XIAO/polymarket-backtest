name: News Lag
description: Enter politics markets after a 5-20% dip — captures delayed reaction to news.

entry:
  condition: price_drop_pct > 0.05 and price_drop_pct < 0.20
  lookback_days: 2

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.04
