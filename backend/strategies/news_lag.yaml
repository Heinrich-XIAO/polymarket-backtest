name: News Lag
description: Enter political markets where price has moved >5% but stabilised — captures delayed consensus formation after news.

entry:
  condition: price_drop_pct > 0.05 and price_drop_pct < 0.20
  lookback_days: 2

exit:
  take_profit: 0.08
  stop_loss: 0.06

filters:
  min_volume: 2000
  categories: [politics]
  max_days_to_resolution: 30

initial_capital: 1000.0
stake_pct: 0.04
