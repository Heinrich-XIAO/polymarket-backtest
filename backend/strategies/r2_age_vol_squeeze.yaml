name: R2 Age-Vol Squeeze
description: Old tight markets suddenly waking up with volume — breakout imminent.

entry:
  condition: market_age_days > 30 and price_range * price_volatility < 0.001 and volume_zscore > 1.0
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 3000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.03
