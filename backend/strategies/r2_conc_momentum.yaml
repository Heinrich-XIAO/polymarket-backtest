name: R2 Concentration Momentum
description: Momentum in crowded sectors — crowd follows the trend.

entry:
  condition: abs(price_momentum) * concentration > 1
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
