name: R8 Vol-Range-Momentum
description: All three volatility dimensions aligned — decisive action.

entry:
  condition: price_volatility > 0.025 and price_range > 0.08 and abs(price_momentum) > 0.04
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
