name: R1 Age-Weighted Momentum
description: Momentum scaled by market maturity — older markets have more reliable signals.

entry:
  condition: price_momentum * min(market_age_days / 30, 1) < -0.05
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
