name: Buy and Hold (Benchmark)
description: Benchmark strategy — buy YES in high-volume markets and hold to resolution. Measures raw market return.

entry:
  condition: price > 0.0
  lookback_days: 1

exit:
  take_profit: 0.95
  stop_loss: 0.90

filters:
  min_volume: 10000
  categories: []
  max_days_to_resolution: 60

initial_capital: 1000.0
stake_pct: 0.01
