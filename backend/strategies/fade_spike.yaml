name: Fade the Spike
description: Sell into sharp 1-day price spikes >15% — bet that sentiment overreacted and reverts.

entry:
  condition: price_drop_pct < -0.15
  lookback_days: 1

exit:
  take_profit: 0.10
  stop_loss: 0.12

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.06
