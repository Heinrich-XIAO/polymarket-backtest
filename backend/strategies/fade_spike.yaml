name: Fade the Spike
description: Buy overreaction reversal after a sharp 15%+ 1-day price drop — hold to resolution.

entry:
  condition: price_drop_pct < -0.15
  lookback_days: 1

exit:
  take_profit: 0.90
  stop_loss: 0.85

filters:
  min_volume: 8000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.05
