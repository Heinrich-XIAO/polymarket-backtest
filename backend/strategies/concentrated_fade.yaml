name: Concentrated Sector Fade
description: Crowded categories with volatile drops — too many competing markets, fade the noise.

entry:
  condition: concentration > 5 and price_volatility > 0.035 and price_drop_pct > 0.08
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.04
