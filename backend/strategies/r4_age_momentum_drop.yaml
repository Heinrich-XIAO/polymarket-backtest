name: R4 Age-Momentum-Drop
description: Old market, below SMA, confirmed drop — mature mean reversion.

entry:
  condition: market_age_days > 45 and price_momentum < -0.04 and price_drop_pct > 0.06
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
