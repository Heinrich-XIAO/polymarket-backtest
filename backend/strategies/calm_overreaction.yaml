name: Calm Overreaction
description: Normally calm market with an outsized drop — likely an overreaction.

entry:
  condition: price_volatility < 0.015 and price_drop_pct > 0.10
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
