name: Mean Reversion
description: Buy when price drops >15% over a week in liquid categorized markets, hold to resolution.

entry:
  condition: price_drop_pct > 0.15
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.05
