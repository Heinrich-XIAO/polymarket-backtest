name: R6 Range Breakout
description: Price breaking out of long-term range — new trend.

entry:
  condition: price_range > 0.18 and price_drop_pct < -0.05
  lookback_days: 10

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
