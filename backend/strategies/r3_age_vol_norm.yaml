name: R3 Age-Normalized Vol
description: Volatility relative to market age — young markets are naturally more volatile.

entry:
  condition: price_volatility * min(market_age_days / 30, 1) > 0.03 and price_drop_pct > 0.06
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
