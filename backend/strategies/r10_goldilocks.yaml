name: R10 Goldilocks
description: Not too calm, not too crazy — just right volatility with a drop.

entry:
  condition: price_volatility > 0.018 and price_volatility < 0.045 and price_drop_pct > 0.07 and volume_zscore > 0.5
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
