name: Range Reversal
description: Price at the bottom of a wide trading range with elevated volatility — bounce off the floor.

entry:
  condition: price_range > 0.12 and price_drop_pct > 0.08 and price_volatility > 0.03
  lookback_days: 10

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 3000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.05
