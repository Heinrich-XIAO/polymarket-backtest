name: R6 Convergence
description: All signals pointing down simultaneously — maximum conviction.

entry:
  condition: price_drop_pct > 0.05 and price_momentum < -0.02 and price_acceleration > -0.005 and volume_zscore > 0.5
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
