name: Volume Capitulation
description: Enter when a price drop is confirmed by unusually high volume — panic selling often reverses.

entry:
  condition: price_drop_pct > 0.08 and volume_zscore > 1.5
  lookback_days: 5

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.04
