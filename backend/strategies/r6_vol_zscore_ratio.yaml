name: R6 Vol-Zscore Ratio
description: Zscore much larger than volatility — volume out of proportion to price action.

entry:
  condition: volume_zscore / max(price_volatility, 0.001) > 30
  lookback_days: 5

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 3000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.03
