name: Steady Accumulation
description: Mature markets in a tight range with building volume — accumulation before move.

entry:
  condition: market_age_days > 30 and price_range < 0.08 and volume_zscore > 1.2 and price_drop_pct > 0.04
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics]
  max_days_to_resolution: 9999

stake_pct: 0.04
