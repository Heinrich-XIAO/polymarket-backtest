name: R2 Price-Volatility Ratio
description: Low price relative to volatility — cheap markets with action.

entry:
  condition: price / max(price_volatility, 0.001) < 10
  lookback_days: 5

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
