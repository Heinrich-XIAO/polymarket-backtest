name: Crypto Follower
description: Follow price momentum in crypto prediction markets — high volatility creates recurring overreaction patterns.

entry:
  condition: price_drop_pct > 0.12 and volume > 5000
  lookback_days: 3

exit:
  take_profit: 0.18
  stop_loss: 0.09

filters:
  min_volume: 5000
  categories: [crypto]
  max_days_to_resolution: 14

initial_capital: 1000.0
stake_pct: 0.08
