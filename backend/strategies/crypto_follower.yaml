name: Crypto Follower
description: Buy significant dips in liquid crypto markets and hold through resolution.

entry:
  condition: price_drop_pct > 0.15 and volume > 8000
  lookback_days: 5

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 8000
  categories: [crypto]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.05
