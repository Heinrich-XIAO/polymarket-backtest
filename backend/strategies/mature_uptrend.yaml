name: Mature Uptrend
description: Long-established markets with rising prices and strong volume.

entry:
  condition: market_age_days > 90 and price_drop_pct < -0.05 and volume_zscore > 1.0
  lookback_days: 5

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, economics]
  max_days_to_resolution: 9999

stake_pct: 0.04
