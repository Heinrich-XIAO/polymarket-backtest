name: Volatility Reversion
description: Enter when volatility is elevated and price has dropped — high-vol dips revert faster.

entry:
  condition: price_volatility > 0.04 and price_drop_pct > 0.12
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.05
