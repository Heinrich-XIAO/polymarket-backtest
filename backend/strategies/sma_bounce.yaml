name: SMA Bounce
description: Buy when price is significantly below its moving average — mean reversion to the trend.

entry:
  condition: price_momentum < -0.08 and price_drop_pct > 0.05
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.05
