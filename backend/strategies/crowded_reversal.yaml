name: Crowded Reversal
description: Crowded sector where a drop is visibly slowing — fading the crowd.

entry:
  condition: concentration > 4 and price_acceleration < -0.01 and price_drop_pct > 0.08
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
