name: Young Market Momentum
description: New markets with rising prices and strong volume — early trend capture.

entry:
  condition: market_age_days < 30 and price_drop_pct < -0.05 and volume_zscore > 1.0
  lookback_days: 5

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 3000
  categories: [politics, crypto, economics, sports, science_tech]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.05
