name: R3 Volatility Band
description: Volatility within a sweet spot — not dead, not crazy.

entry:
  condition: price_volatility > 0.02 and price_volatility < 0.06 and price_drop_pct > 0.08
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
