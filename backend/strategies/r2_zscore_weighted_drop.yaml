name: R2 Zscore-Weighted Drop
description: Drop amplified by volume anomaly — volume confirms conviction.

entry:
  condition: price_drop_pct * (1 + volume_zscore) > 0.2
  lookback_days: 5

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
