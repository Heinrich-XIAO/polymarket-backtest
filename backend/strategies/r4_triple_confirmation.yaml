name: R4 Triple Confirmation
description: Drop + volatility + volume — three-layer confirmation.

entry:
  condition: price_drop_pct > 0.06 and price_volatility > 0.025 and volume_zscore > 1.0
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.05
