name: Quiet Accumulation
description: Low volatility steady drops with high relative volume — informed accumulation before a catalyst.

entry:
  condition: price_volatility < 0.02 and price_drop_pct > 0.05 and volume_zscore > 1.2
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.04
