name: Crypto Volatility Play
description: Buy large price dips in high-volume crypto markets and hold to resolution.

entry:
  condition: price_drop_pct > 0.15 and volume > 8000
  lookback_days: 3

exit:
  take_profit: 0.90
  stop_loss: 0.85

filters:
  min_volume: 8000
  categories: [crypto]
  max_days_to_resolution: 9999

initial_capital: 1000.0
stake_pct: 0.06
