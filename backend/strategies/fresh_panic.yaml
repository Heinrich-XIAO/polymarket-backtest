name: Fresh Panic
description: New markets with sharp panic drops — overreaction in immature markets.

entry:
  condition: market_age_days < 15 and price_drop_pct > 0.15 and volume_zscore > 1.5
  lookback_days: 3

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 3000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.03
