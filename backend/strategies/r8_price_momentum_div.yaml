name: R8 Price-Momentum Divergence
description: Price and momentum diverging — early reversal signal.

entry:
  condition: price_drop_pct > 0.05 and price_momentum > -0.01
  lookback_days: 7

exit:
  take_profit: 0.85
  stop_loss: 0.80

filters:
  min_volume: 5000
  categories: [politics, crypto, economics, sports]
  max_days_to_resolution: 9999

stake_pct: 0.04
